<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LiPo Battery Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="author" content="Lerry William" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'none'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="icon" type="image/png" href="icons/favicon-32x32.png" sizes="32x32" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <span class="app-title">LiPo Battery Calculator</span>
      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">◐</button>
    </header>

    <p class="intro">
      Estimates pack voltages, energy, max current, run time, charge time, charger
      wattage, sizing, and storage/planning info for LiPo and other lithium packs.
    </p>

    <div class="card">
      <div class="grid">
        <div class="field">
          <label for="chemistry">Chemistry</label>
          <select class="input" id="chemistry"><option value="" selected>Select…</option></select>
        </div>
        <div class="field">
          <label for="cells">Cell count (S)</label>
          <select class="input" id="cells">
            <option value="" selected>Select…</option>
            <option value="1">1S</option>
            <option value="2">2S</option>
            <option value="3">3S</option>
            <option value="4">4S</option>
            <option value="5">5S</option>
            <option value="6">6S</option>
            <option value="7">7S</option>
            <option value="8">8S</option>
            <option value="9">9S</option>
            <option value="10">10S</option>
            <option value="11">11S</option>
            <option value="12">12S</option>
          </select>
        </div>
        <div class="field">
          <label for="capacity">Capacity (mAh)</label>
          <input class="input" type="number" id="capacity" min="0" step="any" placeholder="0" />
        </div>
        <div class="field">
          <label for="discharge-c">Discharge rating (C)</label>
          <input class="input" type="number" id="discharge-c" min="0" step="any" placeholder="0" />
        </div>
        <div class="field">
          <label for="charge-c">Charge rate (C)</label>
          <input class="input" type="number" id="charge-c" min="0" step="any" placeholder="0" />
        </div>
        <div class="field">
          <label for="avg-current">Average current draw (A)</label>
          <input class="input" type="number" id="avg-current" min="0" step="any" placeholder="0" />
        </div>
        <div class="field">
          <label for="dod">Usable capacity (%)</label>
          <input class="input" type="number" id="dod" min="1" max="100" step="any" placeholder="80" />
        </div>
        <div class="field">
          <label for="packs">Packs charged at once</label>
          <input class="input" type="number" id="packs" min="1" step="1" placeholder="1" />
        </div>
        <div class="field">
          <label for="target-current">Target current (A) — optional</label>
          <input class="input" type="number" id="target-current" min="0" step="any" placeholder="" />
        </div>
      </div>
      <p class="error" id="form-error" role="alert"></p>
    </div>

    <div class="card">
      <p class="results-hint" id="results-hint">Enter your battery details to see results.</p>
      <div class="results" id="results" hidden></div>
    </div>

    <footer>
      <p>Build with &#9829; by <a href="https://lerryws.xyz">wslerry</a> &middot; &copy; <span id="year"></span></p>
    </footer>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
